<div class="login-card">
  <div class="card-header">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2>Welcome Back</h2>
    <p>Sign in to manage your restaurant outlets</p>
  </div>

  <div *ngIf="errorMessage()" class="error-banner animate-slide-in">
    <span class="error-icon">⚠️</span>
    <span class="error-text">{{ errorMessage() }}</span>
  </div>

  <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrapper">
        <span class="input-icon">✉️</span>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          placeholder="admin@engineeringtadka.com"
          required 
          autocomplete="email"
        />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>
    </div>

    <button type="submit" [disabled]="loading() || !loginForm.valid" class="btn-submit">
      <span *ngIf="loading()" class="spinner"></span>
      <span *ngIf="!loading()">Login</span>
    </button>
  </form>

  <div class="card-footer">
    <p>Don't have an account? <a routerLink="/register">Register here</a></p>
  </div>
</div>
